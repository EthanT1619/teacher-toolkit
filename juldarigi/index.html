<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>줄다리기 게임</title>
  <link rel="stylesheet" href="../shared/toolkit-home.css">
  <script src="../shared/toolkit-home.js" defer></script>
  <style>
    :root {
      --bg: #f0fdf4;
      --surface: #ffffff;
      --team-a: #2563eb;
      --team-a-light: #dbeafe;
      --team-b: #dc2626;
      --team-b-light: #fee2e2;
      --grass: #22c55e;
      --grass-dark: #16a34a;
      --rope: #92400e;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #ecfdf5 0%, var(--bg) 40%, #fef9c3 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
    }

    .view { display: none; min-height: 100vh; }
    .view.active { display: flex; flex-direction: column; }

    /* ── Setup ── */
    .setup-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 16px 48px;
      width: 100%;
    }

    header { text-align: center; margin-bottom: 28px; }
    header h1 {
      font-size: 1.85rem;
      font-weight: 800;
      color: var(--grass-dark);
      letter-spacing: -0.02em;
    }
    header p { color: var(--text-muted); margin-top: 8px; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .field-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--grass);
    }

    .hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 13px 22px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-start {
      width: 100%;
      background: linear-gradient(180deg, var(--grass), var(--grass-dark));
      color: white;
      margin-top: 8px;
      box-shadow: 0 4px 0 #15803d;
    }

    .btn-start:hover { filter: brightness(1.06); }

    /* ── Play ── */
    .play-view { flex: 1; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgb(255 255 255 / 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .icon-btn {
      padding: 8px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
    }

    .icon-btn:hover { border-color: var(--grass); }

    .status-text {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      flex: 1;
      padding: 0 12px;
    }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 32px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .team-score {
      padding: 14px 16px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .team-score.a {
      background: var(--team-a-light);
      border: 2px solid var(--team-a);
    }

    .team-score.b {
      background: var(--team-b-light);
      border: 2px solid var(--team-b);
    }

    .team-score .name {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .team-score.a .name { color: var(--team-a); }
    .team-score.b .name { color: var(--team-b); }

    .team-score .pts {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1.2;
    }

    .vs-badge {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-muted);
      background: white;
      border: 2px solid var(--border);
      border-radius: 999px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Tug field ── */
    .tug-field {
      position: relative;
      background: linear-gradient(180deg, #86efac 0%, var(--grass) 30%, var(--grass-dark) 100%);
      border-radius: var(--radius);
      padding: 48px 16px 36px;
      margin-bottom: 24px;
      box-shadow: inset 0 4px 12px rgb(0 0 0 / 0.15), var(--shadow);
      overflow: hidden;
    }

    .tug-field::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 28px,
        rgb(255 255 255 / 0.06) 28px,
        rgb(255 255 255 / 0.06) 30px
      );
      pointer-events: none;
    }

    .center-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: rgb(255 255 255 / 0.7);
      transform: translateX(-50%);
      z-index: 1;
    }

    .center-line::after {
      content: '중앙';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      background: rgb(0 0 0 / 0.35);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .win-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 12%;
      opacity: 0.25;
      z-index: 0;
    }

    .win-zone.left {
      left: 0;
      background: var(--team-a);
    }

    .win-zone.right {
      right: 0;
      background: var(--team-b);
    }

    .team-label {
      position: absolute;
      top: 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 3px rgb(0 0 0 / 0.4);
      z-index: 2;
    }

    .team-label.left { left: 16px; }
    .team-label.right { right: 16px; }

    .rope-track {
      position: relative;
      height: 80px;
      z-index: 2;
    }

    .rope {
      position: absolute;
      top: 50%;
      left: 5%;
      right: 5%;
      height: 10px;
      background: linear-gradient(180deg, #b45309, var(--rope));
      border-radius: 5px;
      transform: translateY(-50%);
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.3);
    }

    .rope::before,
    .rope::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: rgb(255 255 255 / 0.5);
      border: 2px solid var(--rope);
    }

    .rope::before { left: -6px; }
    .rope::after { right: -6px; }

    .flag {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 3;
    }

    .flag-pole {
      width: 4px;
      height: 52px;
      background: #475569;
      margin: 0 auto;
      border-radius: 2px;
    }

    .flag-cloth {
      position: absolute;
      top: 0;
      left: 4px;
      width: 28px;
      height: 20px;
      background: #fbbf24;
      border-radius: 0 4px 4px 0;
      box-shadow: 1px 1px 3px rgb(0 0 0 / 0.2);
    }

    .position-label {
      text-align: center;
      margin-top: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgb(0 0 0 / 0.3);
      position: relative;
      z-index: 2;
    }

    /* ── Input panel ── */
    .input-panel {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: end;
    }

    .team-input-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .team-input-box.a { border-top: 4px solid var(--team-a); }
    .team-input-box.b { border-top: 4px solid var(--team-b); }

    .team-input-box .label {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .team-input-box.a .label { color: var(--team-a); }
    .team-input-box.b .label { color: var(--team-b); }

    .num-input {
      width: 100%;
      padding: 14px;
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
    }

    .team-input-box.a .num-input:focus {
      outline: none;
      border-color: var(--team-a);
    }

    .team-input-box.b .num-input:focus {
      outline: none;
      border-color: var(--team-b);
    }

    .pull-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    .btn-pull {
      background: linear-gradient(180deg, #fbbf24, #d97706);
      color: white;
      padding: 16px 20px;
      font-size: 1.05rem;
      box-shadow: 0 4px 0 #b45309;
      white-space: nowrap;
    }

    .btn-pull:hover { filter: brightness(1.06); }

    .pull-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 90px;
    }

    .round-log {
      margin-top: 20px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .round-log h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .log-list {
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.88rem;
    }

    .log-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .log-item:last-child { border-bottom: none; }

    .log-item .delta-a { color: var(--team-a); font-weight: 700; }
    .log-item .delta-b { color: var(--team-b); font-weight: 700; }

    /* ── Win overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgb(0 0 0 / 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.show { display: flex; }

    .overlay-card {
      background: white;
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .overlay-card .emoji { font-size: 3rem; margin-bottom: 12px; }
    .overlay-card h2 { font-size: 1.5rem; margin-bottom: 8px; }
    .overlay-card p { color: var(--text-muted); margin-bottom: 20px; }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-secondary {
      background: white;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .btn-primary {
      background: var(--grass);
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgb(30 41 59 / 0.92);
      color: white;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .input-panel {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      .pull-btn-wrap { order: 3; padding: 8px 0; }
      .team-input-box.a { order: 1; }
      .team-input-box.b { order: 2; }

      .btn-pull { width: 100%; }

      .score-row {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }

      .vs-badge {
        grid-column: 1 / -1;
        justify-self: center;
      }
    }
  </style>
</head>
<body>

<!-- 설정 -->
<section id="setupView" class="view active">
  <div class="setup-wrap">
    <header>
      <h1>🪢 줄다리기 게임</h1>
      <p>카드를 뽑아 팀 점수를 입력하고, 먼저 상대를 끌어당기면 승리!</p>
    </header>

    <div class="card">
      <div class="card-title">팀 이름</div>
      <div class="field-row">
        <div>
          <label class="field-label" for="teamAName">A팀 (왼쪽)</label>
          <input type="text" id="teamAName" placeholder="예: 1반" maxlength="12">
        </div>
        <div>
          <label class="field-label" for="teamBName">B팀 (오른쪽)</label>
          <input type="text" id="teamBName" placeholder="예: 2반" maxlength="12">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">승리 조건</div>
      <label class="field-label" for="winPoints">이기려면 모아야 하는 포인트</label>
      <input type="number" id="winPoints" min="5" max="100" value="30">
      <p class="hint">양 팀이 번갈아 카드(1~9) 점수를 입력합니다. 누적 차이가 이 값에 도달하면 승리합니다.</p>
    </div>

    <button class="btn btn-start" id="startBtn">▶ 게임 시작</button>
  </div>
</section>

<!-- 플레이 -->
<section id="playView" class="view play-view">
  <div class="top-bar">
    <button class="icon-btn" id="backBtn">← 설정</button>
    <span class="status-text" id="statusText">카드를 뽑고 팀 점수를 입력하세요</span>
    <button class="icon-btn" id="resetBtn">↻ 다시</button>
  </div>

  <div class="game-area">
    <div class="score-row">
      <div class="team-score a">
        <div class="name" id="scoreAName">A팀</div>
        <div class="pts"><span id="scoreA">0</span></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="team-score b">
        <div class="name" id="scoreBName">B팀</div>
        <div class="pts"><span id="scoreB">0</span></div>
      </div>
    </div>

    <div class="tug-field">
      <div class="win-zone left"></div>
      <div class="win-zone right"></div>
      <div class="center-line"></div>
      <div class="team-label left" id="fieldAName">A팀</div>
      <div class="team-label right" id="fieldBName">B팀</div>

      <div class="rope-track">
        <div class="rope"></div>
        <div class="flag" id="flag">
          <div class="flag-pole"></div>
          <div class="flag-cloth"></div>
        </div>
      </div>

      <div class="position-label" id="positionLabel">중앙 (0 / <span id="winLabel">30</span>)</div>
    </div>

    <div class="input-panel">
      <div class="team-input-box a">
        <div class="label" id="inputAName">A팀 점수</div>
        <input type="number" class="num-input" id="inputA" min="0" max="9" placeholder="0" inputmode="numeric">
      </div>

      <div class="pull-btn-wrap">
        <button class="btn btn-pull" id="pullBtn">당기기!</button>
        <span class="pull-hint">Enter 키로도 적용</span>
      </div>

      <div class="team-input-box b">
        <div class="label" id="inputBName">B팀 점수</div>
        <input type="number" class="num-input" id="inputB" min="0" max="9" placeholder="0" inputmode="numeric">
      </div>
    </div>

    <div class="round-log">
      <h3>라운드 기록</h3>
      <div class="log-list" id="logList">
        <div class="log-item" style="color:var(--text-muted);justify-content:center;">아직 기록이 없습니다</div>
      </div>
    </div>
  </div>
</section>

<!-- 승리 -->
<div class="overlay" id="winOverlay">
  <div class="overlay-card">
    <div class="emoji">🎉</div>
    <h2 id="winTitle">승리!</h2>
    <p id="winDesc"></p>
    <div class="overlay-actions">
      <button class="btn btn-secondary" id="winBackBtn">설정으로</button>
      <button class="btn btn-primary" id="winRematchBtn">다시 하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'juldarigiGame';

  const state = {
    teamAName: 'A팀',
    teamBName: 'B팀',
    winPoints: 30,
    position: 0,
    round: 0,
    log: [],
    gameOver: false,
  };

  const els = {
    setupView: document.getElementById('setupView'),
    playView: document.getElementById('playView'),
    teamAName: document.getElementById('teamAName'),
    teamBName: document.getElementById('teamBName'),
    winPoints: document.getElementById('winPoints'),
    startBtn: document.getElementById('startBtn'),
    backBtn: document.getElementById('backBtn'),
    resetBtn: document.getElementById('resetBtn'),
    statusText: document.getElementById('statusText'),
    scoreAName: document.getElementById('scoreAName'),
    scoreBName: document.getElementById('scoreBName'),
    scoreA: document.getElementById('scoreA'),
    scoreB: document.getElementById('scoreB'),
    fieldAName: document.getElementById('fieldAName'),
    fieldBName: document.getElementById('fieldBName'),
    flag: document.getElementById('flag'),
    positionLabel: document.getElementById('positionLabel'),
    winLabel: document.getElementById('winLabel'),
    inputAName: document.getElementById('inputAName'),
    inputBName: document.getElementById('inputBName'),
    inputA: document.getElementById('inputA'),
    inputB: document.getElementById('inputB'),
    pullBtn: document.getElementById('pullBtn'),
    logList: document.getElementById('logList'),
    winOverlay: document.getElementById('winOverlay'),
    winTitle: document.getElementById('winTitle'),
    winDesc: document.getElementById('winDesc'),
    winBackBtn: document.getElementById('winBackBtn'),
    winRematchBtn: document.getElementById('winRematchBtn'),
    toast: document.getElementById('toast'),
  };

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (saved.teamAName) els.teamAName.value = saved.teamAName;
      if (saved.teamBName) els.teamBName.value = saved.teamBName;
      if (saved.winPoints) els.winPoints.value = saved.winPoints;
    } catch { /* ignore */ }
  }

  function saveSettings() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      teamAName: els.teamAName.value.trim() || 'A팀',
      teamBName: els.teamBName.value.trim() || 'B팀',
      winPoints: parseInt(els.winPoints.value, 10) || 30,
    }));
  }

  let toastTimer;
  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2200);
  }

  function clamp(val, min, max) {
    return Math.min(max, Math.max(min, val));
  }

  function parseScore(input) {
    const raw = input.value.trim();
    if (raw === '') return 0;
    const n = parseInt(raw, 10);
    if (Number.isNaN(n)) return null;
    return clamp(n, 0, 9);
  }

  function updateDisplay() {
    const wp = state.winPoints;
    const pos = state.position;

    els.scoreAName.textContent = state.teamAName;
    els.scoreBName.textContent = state.teamBName;
    els.fieldAName.textContent = state.teamAName;
    els.fieldBName.textContent = state.teamBName;
    els.inputAName.textContent = `${state.teamAName} 점수`;
    els.inputBName.textContent = `${state.teamBName} 점수`;
    els.winLabel.textContent = wp;

    const aAdv = Math.max(0, pos);
    const bAdv = Math.max(0, -pos);
    els.scoreA.textContent = aAdv;
    els.scoreB.textContent = bAdv;

    const pct = 50 - (pos / wp) * 40;
    els.flag.style.left = `${clamp(pct, 8, 92)}%`;

    if (pos > 0) {
      els.positionLabel.innerHTML = `${state.teamAName} 쪽으로 <strong>${pos}</strong> / ${wp}`;
    } else if (pos < 0) {
      els.positionLabel.innerHTML = `${state.teamBName} 쪽으로 <strong>${-pos}</strong> / ${wp}`;
    } else {
      els.positionLabel.innerHTML = `중앙 (0 / ${wp})`;
    }
  }

  function renderLog() {
    if (state.log.length === 0) {
      els.logList.innerHTML = '<div class="log-item" style="color:var(--text-muted);justify-content:center;">아직 기록이 없습니다</div>';
      return;
    }

    els.logList.innerHTML = state.log.slice().reverse().map(entry => {
      const delta = entry.a - entry.b;
      let result;
      if (delta > 0) result = `<span class="delta-a">${state.teamAName} +${delta}</span>`;
      else if (delta < 0) result = `<span class="delta-b">${state.teamBName} +${-delta}</span>`;
      else result = '무승부';

      return `<div class="log-item">
        <span>${entry.round}라운드 · A ${entry.a} : B ${entry.b}</span>
        <span>${result}</span>
      </div>`;
    }).join('');
  }

  function resetGame() {
    state.position = 0;
    state.round = 0;
    state.log = [];
    state.gameOver = false;
    els.inputA.value = '';
    els.inputB.value = '';
    els.winOverlay.classList.remove('show');
    els.statusText.textContent = '카드를 뽑고 팀 점수를 입력하세요';
    els.pullBtn.disabled = false;
    els.inputA.disabled = false;
    els.inputB.disabled = false;
    updateDisplay();
    renderLog();
    els.inputA.focus();
  }

  function startGame() {
    state.teamAName = els.teamAName.value.trim() || 'A팀';
    state.teamBName = els.teamBName.value.trim() || 'B팀';
    state.winPoints = clamp(parseInt(els.winPoints.value, 10) || 30, 5, 100);
    saveSettings();

    els.setupView.classList.remove('active');
    els.playView.classList.add('active');
    resetGame();
    showToast('줄다리기 시작!');
  }

  function goSetup() {
    els.playView.classList.remove('active');
    els.setupView.classList.add('active');
    els.winOverlay.classList.remove('show');
  }

  function showWin(winner) {
    state.gameOver = true;
    els.pullBtn.disabled = true;
    els.inputA.disabled = true;
    els.inputB.disabled = true;
    els.winTitle.textContent = `${winner} 승리!`;
    els.winDesc.textContent = `${state.round}라운드 만에 ${state.winPoints}포인트를 달성했습니다.`;
    els.winOverlay.classList.add('show');
    els.statusText.textContent = `${winner}의 승리!`;
  }

  function applyPull() {
    if (state.gameOver) return;

    const a = parseScore(els.inputA);
    const b = parseScore(els.inputB);

    if (a === null || b === null) {
      showToast('0~9 사이 숫자를 입력하세요');
      return;
    }

    if (a === 0 && b === 0) {
      showToast('최소 한 팀은 점수를 입력하세요');
      return;
    }

    state.round += 1;
    state.position += a - b;
    state.log.push({ round: state.round, a, b });

    els.inputA.value = '';
    els.inputB.value = '';
    updateDisplay();
    renderLog();

    const wp = state.winPoints;

    if (state.position >= wp) {
      showWin(state.teamAName);
    } else if (state.position <= -wp) {
      showWin(state.teamBName);
    } else {
      const delta = a - b;
      if (delta > 0) {
        showToast(`${state.teamAName} ${delta}칸 당김!`);
        els.statusText.textContent = `${state.round}라운드 · ${state.teamAName} +${delta}`;
      } else if (delta < 0) {
        showToast(`${state.teamBName} ${-delta}칸 당김!`);
        els.statusText.textContent = `${state.round}라운드 · ${state.teamBName} +${-delta}`;
      } else {
        showToast('힘겨루기! 위치 변화 없음');
        els.statusText.textContent = `${state.round}라운드 · 무승부`;
      }
      els.inputA.focus();
    }
  }

  els.startBtn.addEventListener('click', startGame);
  els.backBtn.addEventListener('click', goSetup);
  els.resetBtn.addEventListener('click', () => {
    resetGame();
    showToast('게임을 초기화했습니다');
  });
  els.pullBtn.addEventListener('click', applyPull);
  els.winBackBtn.addEventListener('click', goSetup);
  els.winRematchBtn.addEventListener('click', resetGame);

  document.addEventListener('keydown', (e) => {
    if (!els.playView.classList.contains('active')) return;
    if (e.key === 'Enter' && !state.gameOver) {
      e.preventDefault();
      applyPull();
    }
    if (e.key === 'Escape') goSetup();
  });

  [els.inputA, els.inputB].forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        applyPull();
      }
    });
  });

  loadSettings();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통아저씨 게임</title>
  <link rel="stylesheet" href="../shared/toolkit-home.css">
  <script src="../shared/toolkit-home.js" defer></script>
  <style>
    :root {
      --wood: #8b5a2b;
      --wood-dark: #5c3d1e;
      --wood-light: #c4956a;
      --gold: #f5c518;
      --cave-dark: #1a1520;
      --cave-mid: #2d2438;
      --text: #f0e6d3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--cave-dark);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    .view { display: none; min-height: 100vh; }
    .view.active { display: flex; flex-direction: column; }

    /* ── Setup ── */
    .setup-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 16px;
      width: 100%;
    }

    .setup-wrap header { text-align: center; margin-bottom: 28px; }
    .setup-wrap h1 { font-size: 1.8rem; font-weight: 900; color: var(--gold); }
    .setup-wrap p { color: #a09080; margin-top: 8px; font-size: 0.95rem; }

    .card {
      background: rgb(45 36 56 / 0.8);
      border: 2px solid var(--wood-dark);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .field-label { font-weight: 600; margin-bottom: 8px; display: block; }

    input[type="number"] {
      width: 72px;
      padding: 8px 10px;
      border: 2px solid var(--wood);
      border-radius: 8px;
      background: var(--cave-dark);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }

    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9rem; cursor: pointer;
    }

    .hint { font-size: 0.82rem; color: #887868; margin-top: 8px; }

    .btn {
      padding: 13px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-start {
      background: linear-gradient(180deg, #5cb85c, #3d8b3d);
      color: white;
      width: 100%;
      box-shadow: 0 4px 0 #2d662d;
    }

    .btn-start:hover { filter: brightness(1.08); }

    /* ── Play view ── */
    .play-view {
      min-height: 100vh;
      position: relative;
      align-items: stretch;
    }

    .cave-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, #3a2f4a 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 100%, #1e1828 0%, var(--cave-dark) 60%);
      z-index: 0;
    }

    .cave-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 80%, #2a2230 0%, transparent 30%),
        radial-gradient(circle at 85% 75%, #2a2230 0%, transparent 25%),
        radial-gradient(circle at 50% 90%, #1a1520 0%, transparent 40%);
    }

    .game-ui {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 12px 16px 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .icon-btn {
      padding: 6px 12px;
      background: rgb(0 0 0 / 0.4);
      border: 1px solid var(--wood);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .status-text {
      font-size: 0.9rem;
      color: #c8b8a0;
      font-weight: 600;
    }

    /* ── Sword row ── */
    .sword-row {
      display: flex;
      justify-content: center;
      gap: clamp(4px, 1.2vw, 10px);
      flex-wrap: wrap;
      padding: 8px 4px 16px;
    }

    .sword-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(4px, 1vw, 8px);
      width: clamp(52px, 8vw, 72px);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .sword-btn:not(:disabled):hover { transform: translateY(-4px) scale(1.06); }
    .sword-btn:not(:disabled):active { transform: scale(0.95); }
    .sword-btn:disabled { cursor: default; opacity: 0.35; filter: grayscale(0.6); }
    .sword-btn.used { pointer-events: none; opacity: 0.2; transform: scale(0.8); }

    .sword-btn svg {
      width: clamp(40px, 6.5vw, 56px);
      height: clamp(52px, 8.5vw, 72px);
      filter: drop-shadow(0 3px 6px rgb(0 0 0 / 0.5));
      flex-shrink: 0;
    }

    .sword-num {
      position: relative;
      width: clamp(22px, 4vw, 28px);
      height: clamp(22px, 4vw, 28px);
      background: var(--gold);
      border-radius: 50%;
      border: 2px solid #c8960a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      font-weight: 900;
      color: #3d2800;
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.4);
      flex-shrink: 0;
    }

    /* ── Main stage ── */
    .main-stage {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(80px, 1fr) minmax(200px, 2fr) minmax(80px, 1fr);
      align-items: center;
      gap: clamp(8px, 2vw, 24px);
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .wood-board {
      aspect-ratio: 1;
      max-width: 140px;
      width: 100%;
      margin: 0 auto;
      background: linear-gradient(145deg, var(--wood-light), var(--wood));
      border: 4px solid var(--wood-dark);
      border-radius: 6px;
      box-shadow: inset 0 2px 8px rgb(255 255 255 / 0.15), 0 6px 16px rgb(0 0 0 / 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      position: relative;
    }

    .wood-board::before, .wood-board::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: #444;
      border-radius: 50%;
      box-shadow: inset 0 1px 2px rgb(0 0 0 / 0.5);
    }

    .wood-board::before { top: 8px; left: 8px; }
    .wood-board::after { top: 8px; right: 8px; }

    .board-label {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 900;
      color: #4caf50;
      -webkit-text-stroke: 1px #1b5e20;
      paint-order: stroke fill;
      text-shadow: 2px 2px 0 #1b5e20;
      letter-spacing: 0.05em;
    }

    .board-content {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: #d4c4a8;
      text-align: center;
      margin-top: 6px;
      line-height: 1.4;
      min-height: 2.5em;
    }

    .board-safe-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 6px;
    }

    .safe-chip {
      background: #4caf50;
      color: white;
      font-size: 0.75rem;
      font-weight: 800;
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Barrel area ── */
    .barrel-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(260px, 45vw, 380px);
    }

    .barrel-wrap {
      position: relative;
      width: clamp(180px, 35vw, 260px);
      height: clamp(220px, 42vw, 320px);
    }

    .barrel-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 12px 24px rgb(0 0 0 / 0.6));
    }

    .pirate-wrap {
      position: absolute;
      top: -2%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      z-index: 3;
      transition: transform 0.05s;
    }

    .pirate-wrap.pop {
      animation: piratePop 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.4) forwards;
    }

    @keyframes piratePop {
      0% { transform: translateX(-50%) translateY(0) scale(1); }
      30% { transform: translateX(-50%) translateY(-120%) scale(1.15); }
      50% { transform: translateX(-50%) translateY(-100%) scale(1.05); }
      70% { transform: translateX(-50%) translateY(-115%) scale(1.1); }
      100% { transform: translateX(-50%) translateY(-110%) scale(1.08); }
    }

    .pirate-svg { width: 100%; filter: drop-shadow(0 4px 8px rgb(0 0 0 / 0.4)); }

    /* Sword slots on barrel */
    .barrel-slots {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .slot-marker {
      position: absolute;
      width: 14px;
      height: 14px;
      background: #3d2800;
      border-radius: 50%;
      border: 2px solid #1a1000;
      transform: translate(-50%, -50%);
      transition: background 0.2s;
    }

    .slot-marker.filled {
      background: transparent;
      border: none;
      width: 28px;
      height: 28px;
    }

    .inserted-sword {
      position: absolute;
      width: 28px;
      height: 50px;
      transform: translate(-50%, -50%) rotate(var(--angle, 0deg));
      opacity: 0;
      animation: swordInsert 0.4s ease forwards;
    }

    @keyframes swordInsert {
      0% { opacity: 0; transform: translate(-50%, -80%) rotate(var(--angle, 0deg)) scale(0.5); }
      100% { opacity: 1; transform: translate(-50%, -50%) rotate(var(--angle, 0deg)) scale(1); }
    }

    /* Flying sword animation */
    .flying-sword {
      position: fixed;
      width: 40px;
      height: 60px;
      z-index: 200;
      pointer-events: none;
      transition: left 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  top 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.45s ease;
    }

    /* ── Bottom controls ── */
    .bottom-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .btn-next {
      background: linear-gradient(180deg, #5cb85c, #3d8b3d);
      color: white;
      font-size: 1.1rem;
      font-weight: 800;
      padding: 12px 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%);
      box-shadow: 0 4px 0 #2d662d, 0 6px 12px rgb(0 0 0 / 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .btn-next.visible { opacity: 1; pointer-events: auto; }
    .btn-next:hover { filter: brightness(1.1); }

    .parrot-mascot {
      width: clamp(60px, 12vw, 90px);
      opacity: 0.9;
    }

    /* Screen shake */
    body.shake { animation: shake 0.5s ease; }

    @keyframes shake {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-6px, 4px); }
      40% { transform: translate(6px, -4px); }
      60% { transform: translate(-4px, -4px); }
      80% { transform: translate(4px, 4px); }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgb(0 0 0 / 0.85);
      color: var(--gold);
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid var(--gold);
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 560px) {
      .main-stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .wood-board { max-width: 100px; }
      .board-left { order: 2; }
      .barrel-area { order: 1; }
      .board-right { order: 3; }
    }
  </style>
</head>
<body>

<!-- 설정 -->
<section id="setupView" class="view active">
  <div class="setup-wrap">
    <header>
      <h1>🏴‍☠️ 통아저씨 게임</h1>
      <p>칼을 골라 통에 꽂으세요. 통아저씨가 튀어나오면 끝!</p>
    </header>
    <div class="card">
      <label class="field-label" for="slotCount">칼(구멍) 개수</label>
      <input type="number" id="slotCount" min="4" max="12" value="10">
      <p class="hint">4~12개. 시작할 때마다 통아저씨 위치가 바뀝니다.</p>
    </div>
    <div class="card">
      <label class="checkbox-label">
        <input type="checkbox" id="soundEnabled" checked>
        <span>효과음 켜기</span>
      </label>
    </div>
    <button class="btn btn-start" id="startBtn">▶ 게임 시작</button>
  </div>
</section>

<!-- 플레이 -->
<section id="playView" class="view play-view">
  <div class="cave-bg"></div>
  <div class="game-ui">
    <div class="top-bar">
      <button class="icon-btn" id="backBtn">← 설정</button>
      <span class="status-text" id="statusText">칼 번호를 골라 통에 꽂으세요</span>
      <button class="icon-btn" id="resetBtn">↻ 다시</button>
    </div>

    <div class="sword-row" id="swordRow"></div>

    <div class="main-stage">
      <div class="wood-board board-left">
        <div class="board-content" id="bombBoard">???</div>
      </div>

      <div class="barrel-area">
        <div class="barrel-wrap" id="barrelWrap">
          <svg class="barrel-svg" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="100" cy="220" rx="75" ry="18" fill="#1a1000" opacity="0.4"/>
            <rect x="30" y="60" width="140" height="155" rx="8" fill="#7a4f28"/>
            <rect x="30" y="60" width="140" height="155" rx="8" fill="url(#woodGrain)" opacity="0.3"/>
            <ellipse cx="100" cy="60" rx="72" ry="22" fill="#9a6535"/>
            <ellipse cx="100" cy="215" rx="72" ry="22" fill="#6b4220"/>
            <rect x="28" y="90" width="144" height="12" rx="3" fill="#3d3d3d"/>
            <rect x="28" y="140" width="144" height="12" rx="3" fill="#3d3d3d"/>
            <rect x="28" y="185" width="144" height="12" rx="3" fill="#3d3d3d"/>
            <ellipse cx="100" cy="60" rx="68" ry="18" fill="none" stroke="#5c3d1e" stroke-width="3"/>
            <defs>
              <pattern id="woodGrain" width="8" height="8" patternUnits="userSpaceOnUse">
                <line x1="0" y1="0" x2="8" y2="8" stroke="#5c3d1e" stroke-width="0.5" opacity="0.5"/>
              </pattern>
            </defs>
          </svg>
          <div class="barrel-slots" id="barrelSlots"></div>
          <div class="pirate-wrap" id="pirateWrap">
            <svg class="pirate-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="60" cy="88" rx="35" ry="12" fill="#fcd9b6"/>
              <circle cx="60" cy="55" r="38" fill="#fcd9b6"/>
              <ellipse cx="60" cy="68" rx="22" ry="14" fill="#f5c99a"/>
              <path d="M 25 38 Q 35 10 55 28" stroke="#4a3728" stroke-width="7" fill="none" stroke-linecap="round"/>
              <path d="M 95 38 Q 85 10 65 28" stroke="#4a3728" stroke-width="7" fill="none" stroke-linecap="round"/>
              <ellipse cx="60" cy="22" rx="42" ry="14" fill="#1a1a2e"/>
              <ellipse cx="60" cy="18" rx="38" ry="10" fill="#2d2d44"/>
              <rect x="48" y="8" width="24" height="6" rx="2" fill="#64748b"/>
              <path d="M 18 22 Q 60 5 102 22" fill="#6b3fa0" stroke="#4a2870" stroke-width="2"/>
              <circle cx="46" cy="50" r="9" fill="white"/>
              <circle cx="74" cy="50" r="9" fill="white"/>
              <circle cx="48" cy="52" r="4.5" fill="#1a1a2e"/>
              <circle cx="76" cy="52" r="4.5" fill="#1a1a2e"/>
              <circle cx="50" cy="49" r="1.5" fill="white"/>
              <circle cx="78" cy="49" r="1.5" fill="white"/>
              <ellipse cx="60" cy="72" rx="7" ry="4" fill="#c73e54"/>
              <path d="M 48 80 Q 60 90 72 80" stroke="#1a1a2e" stroke-width="2.5" fill="none"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="wood-board board-right">
        <div class="board-label" style="color:#90caf9;-webkit-text-stroke:1px #1565c0;">SAFE</div>
        <div class="board-content" id="safeBoard">0 / 9</div>
        <div class="board-safe-list" id="safeList"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn-next" id="nextBtn">Next ▶</button>
      <svg class="parrot-mascot" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="70" rx="20" ry="6" fill="#1a1000" opacity="0.3"/>
        <ellipse cx="40" cy="55" rx="22" ry="18" fill="#4caf50"/>
        <circle cx="40" cy="38" r="18" fill="#66bb6a"/>
        <path d="M 55 38 L 72 42 L 55 46 Z" fill="#ff9800"/>
        <circle cx="34" cy="35" r="5" fill="white"/>
        <circle cx="35" cy="36" r="2.5" fill="#1a1a2e"/>
        <ellipse cx="40" cy="18" rx="16" ry="8" fill="#1a1a2e"/>
        <rect x="50" y="48" width="22" height="8" rx="3" fill="#795548" transform="rotate(-20 50 48)"/>
        <circle cx="68" cy="44" r="6" fill="#37474f"/>
        <circle cx="68" cy="44" r="3" fill="#78909c"/>
      </svg>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'tongAjossiGame';

  const state = {
    slotCount: 10,
    triggerIndex: -1,
    used: new Set(),
    gameOver: false,
    soundEnabled: true,
    animating: false,
  };

  const els = {
    setupView: document.getElementById('setupView'),
    playView: document.getElementById('playView'),
    slotCount: document.getElementById('slotCount'),
    soundEnabled: document.getElementById('soundEnabled'),
    startBtn: document.getElementById('startBtn'),
    backBtn: document.getElementById('backBtn'),
    resetBtn: document.getElementById('resetBtn'),
    statusText: document.getElementById('statusText'),
    swordRow: document.getElementById('swordRow'),
    barrelSlots: document.getElementById('barrelSlots'),
    pirateWrap: document.getElementById('pirateWrap'),
    bombBoard: document.getElementById('bombBoard'),
    safeBoard: document.getElementById('safeBoard'),
    safeList: document.getElementById('safeList'),
    nextBtn: document.getElementById('nextBtn'),
    toast: document.getElementById('toast'),
  };

  let toastTimer = null;
  let audioCtx = null;

  /* Slot positions around barrel (percent of barrel-wrap) */
  function getSlotPositions(count) {
    const positions = [];
    const cx = 50, cy = 55;
    const rx = 46, ry = 38;
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (2 * Math.PI * i) / count;
      positions.push({
        x: cx + rx * Math.cos(angle),
        y: cy + ry * Math.sin(angle),
        angleDeg: (angle * 180 / Math.PI) + 90,
      });
    }
    return positions;
  }

  function swordSvg() {
    return `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="27" y="10" width="6" height="30" rx="2" fill="#c0c0c0"/>
      <rect x="22" y="38" width="16" height="5" rx="1" fill="#ffd700"/>
      <rect x="28" y="42" width="4" height="28" rx="1" fill="#8b6914"/>
      <polygon points="30,70 26,80 34,80" fill="#6b5010"/>
      <ellipse cx="30" cy="8" rx="8" ry="4" fill="#d0d0d0"/>
    </svg>`;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      slotCount: state.slotCount,
      soundEnabled: state.soundEnabled,
    }));
  }

  function load() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (data.slotCount) { state.slotCount = data.slotCount; els.slotCount.value = data.slotCount; }
      if (typeof data.soundEnabled === 'boolean') {
        state.soundEnabled = data.soundEnabled;
        els.soundEnabled.checked = data.soundEnabled;
      }
    } catch { /* ignore */ }
  }

  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2500);
  }

  function playSound(type) {
    if (!state.soundEnabled) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'insert') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } else if (type === 'pop') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.5);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.55);
        osc.start(now);
        osc.stop(now + 0.55);
      }
    } catch { /* ignore */ }
  }

  function renderSwords() {
    els.swordRow.innerHTML = Array.from({ length: state.slotCount }, (_, i) => `
      <button class="sword-btn" data-index="${i}" aria-label="칼 ${i + 1}">
        <span class="sword-num">${i + 1}</span>
        ${swordSvg()}
      </button>
    `).join('');
  }

  function renderBarrelSlots() {
    const positions = getSlotPositions(state.slotCount);
    els.barrelSlots.innerHTML = positions.map((pos, i) => `
      <div class="slot-marker" data-slot="${i}" style="left:${pos.x}%;top:${pos.y}%;"></div>
    `).join('');
  }

  function updateBoards() {
    const safe = state.used.size;
    const total = state.slotCount;
    els.safeBoard.textContent = state.gameOver
      ? `총 ${safe}번 안전`
      : `${safe} / ${total - 1}`;
    els.safeList.innerHTML = [...state.used]
      .filter(i => i !== state.triggerIndex)
      .sort((a, b) => a - b)
      .map(i => `<span class="safe-chip">${i + 1}</span>`)
      .join('');
    els.bombBoard.textContent = state.gameOver
      ? `${state.triggerIndex + 1}번!`
      : '???';
  }

  function resetPirate() {
    els.pirateWrap.classList.remove('pop');
    void els.pirateWrap.offsetWidth;
  }

  function newRound() {
    state.triggerIndex = Math.floor(Math.random() * state.slotCount);
    state.used = new Set();
    state.gameOver = false;
    state.animating = false;

    resetPirate();
    renderSwords();
    renderBarrelSlots();
    els.nextBtn.classList.remove('visible');
    els.statusText.textContent = '칼 번호를 골라 통에 꽂으세요';
    updateBoards();
  }

  function startGame() {
    state.slotCount = Math.min(12, Math.max(4, parseInt(els.slotCount.value, 10) || 10));
    state.soundEnabled = els.soundEnabled.checked;
    save();

    els.setupView.classList.remove('active');
    els.playView.classList.add('active');
    newRound();
    showToast('통아저씨가 어디에 숨었을까요?');
  }

  function insertSwordAtSlot(index) {
    const positions = getSlotPositions(state.slotCount);
    const pos = positions[index];
    const marker = els.barrelSlots.querySelector(`[data-slot="${index}"]`);
    if (!marker) return;

    marker.classList.add('filled');
    const sword = document.createElement('div');
    sword.className = 'inserted-sword';
    sword.style.cssText = `left:${pos.x}%;top:${pos.y}%;--angle:${pos.angleDeg}deg;`;
    sword.innerHTML = swordSvg();
    els.barrelSlots.appendChild(sword);
  }

  function flySword(fromBtn, index, callback) {
    const positions = getSlotPositions(state.slotCount);
    const pos = positions[index];
    const barrelRect = document.getElementById('barrelWrap').getBoundingClientRect();
    const targetX = barrelRect.left + barrelRect.width * pos.x / 100;
    const targetY = barrelRect.top + barrelRect.height * pos.y / 100;

    const btnRect = fromBtn.getBoundingClientRect();
    const flyer = document.createElement('div');
    flyer.className = 'flying-sword';
    flyer.innerHTML = swordSvg();
    flyer.style.left = `${btnRect.left + btnRect.width / 2 - 20}px`;
    flyer.style.top = `${btnRect.top + btnRect.height / 2 - 30}px`;
    document.body.appendChild(flyer);

    requestAnimationFrame(() => {
      flyer.style.left = `${targetX - 20}px`;
      flyer.style.top = `${targetY - 30}px`;
      flyer.style.transform = `rotate(${pos.angleDeg}deg)`;
    });

    setTimeout(() => {
      flyer.remove();
      callback();
    }, 480);
  }

  function pickSword(index) {
    if (state.gameOver || state.animating || state.used.has(index)) return;

    const btn = els.swordRow.querySelector(`[data-index="${index}"]`);
    if (!btn) return;

    state.animating = true;
    btn.classList.add('used');
    btn.disabled = true;

    flySword(btn, index, () => {
      state.used.add(index);
      insertSwordAtSlot(index);
      playSound('insert');

      const isTrigger = index === state.triggerIndex;

      if (isTrigger) {
        state.gameOver = true;
        els.statusText.textContent = `${index + 1}번 — 통아저씨 등장!!!`;
        setTimeout(() => {
          playSound('pop');
          els.pirateWrap.classList.add('pop');
          document.body.classList.add('shake');
          if (navigator.vibrate) navigator.vibrate([80, 40, 80, 40, 150]);
          setTimeout(() => document.body.classList.remove('shake'), 500);
          els.nextBtn.classList.add('visible');
          updateBoards();
        }, 200);
      } else {
        const remaining = state.slotCount - state.used.size;
        els.statusText.textContent = `${index + 1}번 안전! ${remaining}개 남음`;
        updateBoards();
      }

      state.animating = false;
    });
  }

  /* Events */
  els.startBtn.addEventListener('click', startGame);
  els.backBtn.addEventListener('click', () => {
    els.playView.classList.remove('active');
    els.setupView.classList.add('active');
  });
  els.resetBtn.addEventListener('click', () => { newRound(); showToast('다시 섞었습니다'); });
  els.nextBtn.addEventListener('click', () => { newRound(); showToast('새 라운드!'); });

  els.swordRow.addEventListener('click', (e) => {
    const btn = e.target.closest('.sword-btn');
    if (!btn || btn.disabled) return;
    pickSword(Number(btn.dataset.index));
  });

  document.addEventListener('keydown', (e) => {
    if (!els.playView.classList.contains('active')) return;
    if (e.key === 'Escape') {
      els.playView.classList.remove('active');
      els.setupView.classList.add('active');
    }
    if ((e.key === 'r' || e.key === 'R') && !state.animating) {
      newRound();
      showToast('다시 섞었습니다');
    }
    if (e.key === 'Enter' && state.gameOver) newRound();
    const num = parseInt(e.key, 10);
    if (num >= 1 && num <= state.slotCount) pickSword(num - 1);
  });

  load();
</script>
</body>
</html>

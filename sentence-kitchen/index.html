<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentence Kitchen β</title>
  <link rel="stylesheet" href="../shared/toolkit-home.css">
  <script src="../shared/toolkit-home.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Sentence Kitchen β</h1>
      <p class="subtitle">주문서에 맞게 재료를 골라 문장을 완성하세요</p>
      <p class="build-estimate" id="build-estimate">MVP 스펙 · 예상 제작 4~6시간 · localStorage 포함</p>
      <p class="build-meta" id="build-meta"></p>
    </header>

    <!-- 선생님 설정 -->
    <section id="phase-setup" class="phase active">
      <div class="panel">
        <h2>재료통 설정</h2>
        <p class="hint">각 칸에 단어를 한 줄에 하나씩 입력하세요.</p>
        <div class="bin-inputs">
          <label>
            <span>주어 (Subject)</span>
            <textarea id="input-subject" rows="4" placeholder="I&#10;Kevin&#10;The teacher&#10;Steve"></textarea>
          </label>
          <label>
            <span>동사 (Verb)</span>
            <textarea id="input-verb" rows="4" placeholder="eat&#10;eats&#10;likes&#10;finds"></textarea>
          </label>
          <label>
            <span>목적어 (Object)</span>
            <textarea id="input-object" rows="4" placeholder="rice&#10;a book&#10;bread&#10;the ball"></textarea>
          </label>
          <label>
            <span>시간 (Time) — 보너스</span>
            <textarea id="input-time" rows="3" placeholder="after school&#10;every day&#10;in the morning"></textarea>
          </label>
          <label>
            <span>이유 (Because) — 보너스</span>
            <textarea id="input-reason" rows="3" placeholder="because he is hungry&#10;because she likes it"></textarea>
          </label>
        </div>
      </div>

      <div class="panel">
        <h2>주문서 종류</h2>
        <p class="hint">게임에 사용할 주문서를 선택하세요. (복수 선택 가능)</p>
        <div id="order-checkboxes" class="order-checkboxes"></div>
      </div>

      <div class="panel">
        <h2>프리셋 저장</h2>
        <div class="preset-row">
          <input id="preset-name" type="text" placeholder="프리셋 이름 (예: 3학년 SVO)">
          <button id="save-preset-btn" class="btn secondary" type="button">저장</button>
        </div>
        <div class="preset-row">
          <select id="preset-select">
            <option value="">— 불러올 프리셋 선택 —</option>
          </select>
          <button id="load-preset-btn" class="btn secondary" type="button">불러오기</button>
          <button id="delete-preset-btn" class="btn ghost" type="button">삭제</button>
        </div>
      </div>

      <div class="panel actions-panel">
        <button id="start-btn" class="btn primary" type="button">게임 시작</button>
      </div>
    </section>

    <!-- 학생 게임 -->
    <section id="phase-game" class="phase">
      <div class="panel order-panel">
        <p class="order-label">주문서</p>
        <h2 id="order-title">S + V + O</h2>
        <p id="order-desc" class="order-desc"></p>
        <div class="score-bar">
          <span>점수: <strong id="total-score">0</strong></span>
          <span>완성: <strong id="order-count">0</strong>개</span>
        </div>
      </div>

      <div class="panel assembly-panel">
        <p class="assembly-label">조립 라인</p>
        <div id="assembly-line" class="assembly-line"></div>
        <p id="preview-sentence" class="preview-sentence">문장을 조립 중...</p>
      </div>

      <div id="bins-area" class="bins-area"></div>

      <p id="game-message" class="game-message"></p>

      <div class="panel game-actions">
        <button id="submit-btn" class="btn primary" type="button">출고</button>
        <button id="next-order-btn" class="btn secondary" type="button" disabled>다음 주문</button>
        <button id="reset-selection-btn" class="btn ghost" type="button">선택 리셋</button>
        <button id="back-setup-btn" class="btn ghost" type="button">설정으로</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>

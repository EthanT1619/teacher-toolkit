<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Classroom Timer - Ethan's Teacher Toolkit -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Classroom Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --accent-warm: #f59e0b;
      --accent-warm-light: #fef3c7;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --success: #16a34a;
      --radius: 14px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
      --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.06);
    }

    html, body {
      height: 100%;
      height: 100dvh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f7fb 50%, #fef3c7 100%);
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body.flash-alarm {
      animation: alarmFlash 0.6s ease-in-out infinite;
    }

    @keyframes alarmFlash {
      0%, 100% { background: linear-gradient(135deg, #eef2ff 0%, #f5f7fb 50%, #fef3c7 100%); }
      50% { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 45%, #fef2f2 100%); }
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    button:not(:disabled):active {
      transform: scale(0.97);
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100%;
      height: 100dvh;
      max-width: 1200px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overflow: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: rgb(255 255 255 / 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 50;
      overflow: visible;
    }

    .top-bar__title {
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--primary);
      white-space: nowrap;
    }

    .top-bar__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn-top {
      padding: 10px 16px;
      min-height: 44px;
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: clamp(0.8rem, 2.2vw, 0.95rem);
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid var(--border);
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-top:not(.btn-top--home):not(.btn-top--reset):not(.btn-top--sound-on):hover {
      background: var(--surface-2);
      border-color: #c7d2fe;
    }

    .btn-top--home {
      background: var(--primary-light);
      color: var(--primary);
      border-color: #c7d2fe;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-top--home:hover { background: #e0e7ff; color: var(--primary-hover); }

    .help-wrap {
      position: relative;
    }

    .btn-top--help {
      background: var(--surface);
      color: var(--text-muted);
    }

    .btn-top--help:hover,
    .help-wrap.is-open .btn-top--help {
      background: var(--primary-light);
      color: var(--primary);
      border-color: #c7d2fe;
    }

    .help-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: max-content;
      max-width: min(320px, 88vw);
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: left;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
      z-index: 100;
      pointer-events: none;
    }

    .help-popover__title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .help-popover kbd {
      display: inline-block;
      min-width: 1.35em;
      padding: 1px 5px;
      margin: 0 1px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface-2);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
    }

    .help-popover__row + .help-popover__row {
      margin-top: 4px;
    }

    .help-wrap:hover .help-popover,
    .help-wrap:focus-within .help-popover,
    .help-wrap.is-open .help-popover {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto;
    }

    .btn-top--reset { background: var(--danger); border-color: #fca5a5; color: #fff; }
    .btn-top--reset:hover { background: #dc2626; }

    .btn-top--sound-on { background: var(--success); border-color: #86efac; color: #fff; }
    .btn-top--sound-off { background: var(--surface-2); color: var(--text-muted); }

    /* ── Display ── */
    .display-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      min-height: 0;
      overflow: hidden;
    }

    .clock-display {
      width: 100%;
      max-width: 900px;
      max-height: 100%;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: clamp(8px, 2vh, 24px) clamp(12px, 3vw, 32px);
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .clock-display::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid var(--primary-light);
      border-radius: calc(var(--radius) - 4px);
      pointer-events: none;
    }

    .time-digits {
      font-family: "Consolas", "Courier New", monospace;
      font-size: clamp(48px, min(12vw, 16vh), 180px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: var(--primary);
      text-shadow: 0 2px 8px rgb(79 70 229 / 0.15);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .time-digits.paused {
      color: var(--accent-warm);
      text-shadow: 0 2px 8px rgb(245 158 11 / 0.2);
    }

    .time-digits.finished {
      color: var(--danger);
      text-shadow: 0 2px 8px rgb(239 68 68 / 0.2);
    }

    .input-preview {
      margin-top: clamp(4px, 1vh, 12px);
      font-size: clamp(0.75rem, 1.8vh, 1rem);
      color: var(--text-muted);
      min-height: 1.2em;
      line-height: 1.3;
    }

    .times-up {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgb(255 255 255 / 0.88);
      border-radius: var(--radius);
      z-index: 2;
    }

    .times-up.visible {
      display: flex;
    }

    .times-up span {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      color: var(--danger);
      letter-spacing: 0.08em;
      text-shadow: 0 4px 12px rgb(239 68 68 / 0.25);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    /* ── Controls ── */
    .controls {
      flex-shrink: 0;
      padding: 10px 14px 14px;
      background: rgb(255 255 255 / 0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 2;
      box-shadow: 0 -4px 12px rgb(0 0 0 / 0.04);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }

    .keypad .btn-digit--zero {
      grid-column: 2;
    }

    .btn-digit {
      min-height: clamp(44px, 8vh, 64px);
      font-size: clamp(1.2rem, 3.5vw, 1.75rem);
      font-weight: 700;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-digit:not(:disabled):hover {
      background: var(--primary-light);
      border-color: #c7d2fe;
      color: var(--primary);
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .btn-action {
      flex: 1 1 auto;
      min-width: clamp(72px, 18vw, 110px);
      min-height: clamp(42px, 7vh, 56px);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 600;
      border: 1px solid transparent;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-start {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgb(79 70 229 / 0.3);
    }

    .btn-start:not(:disabled):hover { background: var(--primary-hover); }

    .btn-pause {
      background: var(--accent-warm);
      color: #78350f;
      border-color: #fcd34d;
    }

    .btn-resume {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgb(37 99 235 / 0.25);
    }

    .btn-clear {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .btn-clear:not(:disabled):hover { background: var(--surface-2); }

    .btn-adjust {
      background: var(--primary-light);
      color: var(--primary);
      border-color: #c7d2fe;
      min-width: clamp(64px, 15vw, 90px);
    }

    .btn-adjust:not(:disabled):hover { background: #e0e7ff; }

    .btn-adjust--minus {
      background: var(--danger-light);
      color: #b91c1c;
      border-color: #fca5a5;
    }

    .btn-adjust--minus:not(:disabled):hover { background: #fecaca; }

    .adjust-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .adjust-row__label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: -4px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      color: var(--text);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-height: 720px) {
      .top-bar {
        padding: 6px 10px;
      }

      .btn-top {
        min-height: 38px;
        padding: 8px 12px;
      }

      .time-digits {
        font-size: clamp(40px, min(10vw, 14vh), 140px);
      }

      .input-preview {
        display: none;
      }

      .controls {
        gap: 8px;
        padding: 8px 10px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <h1 class="top-bar__title">Classroom Timer</h1>
      <div class="top-bar__actions">
        <a class="btn-top btn-top--home" href="../index.html">Tool Kit</a>
        <div class="help-wrap" id="helpWrap">
          <button type="button" class="btn-top btn-top--help" id="btnHelp" aria-expanded="false" aria-controls="helpPopover">How to use</button>
          <div class="help-popover" id="helpPopover" role="tooltip">
            <div class="help-popover__title">Keyboard shortcuts</div>
            <div class="help-popover__row"><kbd>0</kbd>–<kbd>9</kbd> Enter time (e.g. <kbd>630</kbd> → 6:30)</div>
            <div class="help-popover__row"><kbd>Enter</kbd> Start / Resume · <kbd>Space</kbd> Pause</div>
            <div class="help-popover__row"><kbd>C</kbd> Clear · <kbd>R</kbd> Reset · <kbd>F</kbd> Fullscreen</div>
            <div class="help-popover__row"><kbd>Backspace</kbd> Delete digit · <kbd>Esc</kbd> Cancel / exit full</div>
          </div>
        </div>
        <button type="button" class="btn-top" id="btnFullscreen" aria-label="Toggle fullscreen">Fullscreen</button>
        <button type="button" class="btn-top btn-top--reset" id="btnResetTop">Reset</button>
        <button type="button" class="btn-top btn-top--sound-on" id="btnSound" aria-pressed="true">Sound ON</button>
      </div>
    </header>

    <main class="display-area">
      <div class="clock-display">
        <div class="time-digits" id="timeDisplay" aria-live="polite">00:00:00</div>
        <div class="input-preview" id="inputPreview"></div>
        <div class="times-up" id="timesUp" aria-hidden="true">
          <span>TIME'S UP!</span>
        </div>
      </div>
    </main>

    <section class="controls" aria-label="Timer controls">
      <div class="keypad" id="keypad">
        <button type="button" class="btn-digit" data-digit="7">7</button>
        <button type="button" class="btn-digit" data-digit="8">8</button>
        <button type="button" class="btn-digit" data-digit="9">9</button>
        <button type="button" class="btn-digit" data-digit="4">4</button>
        <button type="button" class="btn-digit" data-digit="5">5</button>
        <button type="button" class="btn-digit" data-digit="6">6</button>
        <button type="button" class="btn-digit" data-digit="1">1</button>
        <button type="button" class="btn-digit" data-digit="2">2</button>
        <button type="button" class="btn-digit" data-digit="3">3</button>
        <button type="button" class="btn-digit btn-digit--zero" data-digit="0">0</button>
      </div>

      <div class="action-row">
        <button type="button" class="btn-action btn-start" id="btnStart">Start</button>
        <button type="button" class="btn-action btn-pause" id="btnPause">Pause</button>
        <button type="button" class="btn-action btn-resume" id="btnResume">Resume</button>
        <button type="button" class="btn-action btn-clear" id="btnClear">Clear</button>
      </div>

      <div class="adjust-row">
        <span class="adjust-row__label">Adjust time (while running)</span>
        <button type="button" class="btn-action btn-adjust" data-adjust="10">+10s</button>
        <button type="button" class="btn-action btn-adjust" data-adjust="30">+30s</button>
        <button type="button" class="btn-action btn-adjust" data-adjust="60">+1m</button>
        <button type="button" class="btn-action btn-adjust btn-adjust--minus" data-adjust="-10">-10s</button>
        <button type="button" class="btn-action btn-adjust btn-adjust--minus" data-adjust="-30">-30s</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    // Classroom Timer - Ethan's Teacher Toolkit

    var timerState = {
      inputBuffer: '',
      totalSeconds: 0,
      remainingSeconds: 0,
      isRunning: false,
      isPaused: false,
      isFinished: false,
      intervalId: null,
      soundEnabled: true
    };

    var audioCtx = null;
    var toastTimer = null;

    var els = {};

    function init() {
      els.timeDisplay = document.getElementById('timeDisplay');
      els.inputPreview = document.getElementById('inputPreview');
      els.timesUp = document.getElementById('timesUp');
      els.toast = document.getElementById('toast');
      els.btnStart = document.getElementById('btnStart');
      els.btnPause = document.getElementById('btnPause');
      els.btnResume = document.getElementById('btnResume');
      els.btnClear = document.getElementById('btnClear');
      els.btnResetTop = document.getElementById('btnResetTop');
      els.btnFullscreen = document.getElementById('btnFullscreen');
      els.btnSound = document.getElementById('btnSound');
      els.helpWrap = document.getElementById('helpWrap');
      els.btnHelp = document.getElementById('btnHelp');
      els.digitButtons = document.querySelectorAll('.btn-digit');
      els.adjustButtons = document.querySelectorAll('[data-adjust]');

      els.btnStart.addEventListener('click', onStartClick);
      els.btnPause.addEventListener('click', pauseTimer);
      els.btnResume.addEventListener('click', resumeTimer);
      els.btnClear.addEventListener('click', clearInput);
      els.btnResetTop.addEventListener('click', resetTimer);
      els.btnFullscreen.addEventListener('click', toggleFullscreen);
      els.btnSound.addEventListener('click', toggleSound);

      els.btnHelp.addEventListener('click', function () {
        var open = els.helpWrap.classList.toggle('is-open');
        els.btnHelp.setAttribute('aria-expanded', open ? 'true' : 'false');
      });

      document.addEventListener('click', function (e) {
        if (!els.helpWrap.contains(e.target)) {
          els.helpWrap.classList.remove('is-open');
          els.btnHelp.setAttribute('aria-expanded', 'false');
        }
      });

      els.digitButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          handleDigit(btn.getAttribute('data-digit'));
        });
      });

      els.adjustButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          adjustTime(parseInt(btn.getAttribute('data-adjust'), 10));
        });
      });

      document.addEventListener('keydown', handleKeydown);
      document.addEventListener('fullscreenchange', render);

      render();
    }

    function unlockAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function parseInputBuffer() {
      var buf = timerState.inputBuffer;
      if (!buf) {
        return { hours: 0, minutes: 0, seconds: 0, totalSeconds: 0, valid: true };
      }

      var seconds = parseInt(buf.slice(-2), 10);
      var minutes = buf.length > 2 ? parseInt(buf.slice(-4, -2) || '0', 10) : 0;
      var hours = buf.length > 4 ? parseInt(buf.slice(0, -4) || '0', 10) : 0;

      var valid = seconds < 60 && minutes < 60;
      var totalSeconds = hours * 3600 + minutes * 60 + seconds;

      return {
        hours: hours,
        minutes: minutes,
        seconds: seconds,
        totalSeconds: totalSeconds,
        valid: valid
      };
    }

    function formatTime(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      var s = seconds % 60;
      return pad2(h) + ':' + pad2(m) + ':' + pad2(s);
    }

    function pad2(n) {
      return n < 10 ? '0' + n : String(n);
    }

    function handleDigit(digit) {
      if (timerState.isRunning || timerState.isPaused || timerState.isFinished) return;
      if (timerState.inputBuffer.length >= 6) {
        showToast('Maximum 6 digits');
        return;
      }
      timerState.inputBuffer += digit;
      var parsed = parseInputBuffer();
      timerState.totalSeconds = parsed.totalSeconds;
      timerState.remainingSeconds = parsed.totalSeconds;
      render();
    }

    function backspaceInput() {
      if (timerState.isRunning || timerState.isPaused || timerState.isFinished) return;
      if (!timerState.inputBuffer) return;
      timerState.inputBuffer = timerState.inputBuffer.slice(0, -1);
      var parsed = parseInputBuffer();
      timerState.totalSeconds = parsed.totalSeconds;
      timerState.remainingSeconds = parsed.totalSeconds;
      render();
    }

    function clearInput() {
      if (timerState.isRunning || timerState.isPaused) return;
      timerState.inputBuffer = '';
      timerState.totalSeconds = 0;
      timerState.remainingSeconds = 0;
      timerState.isFinished = false;
      document.body.classList.remove('flash-alarm');
      render();
    }

    function onStartClick() {
      unlockAudio();
      startTimer();
    }

    function startTimer() {
      if (timerState.isRunning) return;

      if (timerState.isFinished) {
        resetTimer();
      }

      if (timerState.isPaused) {
        resumeTimer();
        return;
      }

      var parsed = parseInputBuffer();
      if (!timerState.inputBuffer || parsed.totalSeconds === 0) {
        showToast('시간을 입력해 주세요');
        return;
      }
      if (!parsed.valid) {
        showToast('Invalid time');
        return;
      }

      timerState.totalSeconds = parsed.totalSeconds;
      timerState.remainingSeconds = parsed.totalSeconds;
      timerState.isRunning = true;
      timerState.isPaused = false;
      timerState.isFinished = false;
      document.body.classList.remove('flash-alarm');
      els.timesUp.classList.remove('visible');

      clearInterval(timerState.intervalId);
      timerState.intervalId = setInterval(tick, 1000);
      render();
    }

    function tick() {
      if (!timerState.isRunning || timerState.isPaused) return;

      timerState.remainingSeconds -= 1;

      if (timerState.remainingSeconds <= 0) {
        timerState.remainingSeconds = 0;
        stopInterval();
        timerState.isRunning = false;
        timerState.isPaused = false;
        timerState.isFinished = true;
        document.body.classList.add('flash-alarm');
        els.timesUp.classList.add('visible');
        playAlarm();
      }

      render();
    }

    function pauseTimer() {
      if (!timerState.isRunning || timerState.isPaused) return;
      timerState.isPaused = true;
      render();
    }

    function resumeTimer() {
      if (!timerState.isRunning || !timerState.isPaused) return;
      unlockAudio();
      timerState.isPaused = false;
      render();
    }

    function stopInterval() {
      if (timerState.intervalId) {
        clearInterval(timerState.intervalId);
        timerState.intervalId = null;
      }
    }

    function resetTimer() {
      stopInterval();
      timerState.inputBuffer = '';
      timerState.totalSeconds = 0;
      timerState.remainingSeconds = 0;
      timerState.isRunning = false;
      timerState.isPaused = false;
      timerState.isFinished = false;
      document.body.classList.remove('flash-alarm');
      els.timesUp.classList.remove('visible');
      render();
    }

    function adjustTime(secondsDelta) {
      if (!timerState.isRunning && !timerState.isPaused && !timerState.isFinished) return;

      timerState.remainingSeconds = Math.max(0, timerState.remainingSeconds + secondsDelta);

      if (timerState.remainingSeconds === 0 && timerState.isRunning && !timerState.isPaused) {
        stopInterval();
        timerState.isRunning = false;
        timerState.isPaused = false;
        timerState.isFinished = true;
        document.body.classList.add('flash-alarm');
        els.timesUp.classList.add('visible');
        playAlarm();
      } else if (timerState.isFinished && timerState.remainingSeconds > 0) {
        timerState.isFinished = false;
        document.body.classList.remove('flash-alarm');
        els.timesUp.classList.remove('visible');
        if (!timerState.isRunning) {
          timerState.isRunning = true;
          timerState.isPaused = false;
          clearInterval(timerState.intervalId);
          timerState.intervalId = setInterval(tick, 1000);
        }
      }

      render();
    }

    function playAlarm() {
      if (!timerState.soundEnabled) return;
      unlockAudio();
      if (!audioCtx) return;

      var now = audioCtx.currentTime;
      var beepInterval = 0.45;
      var beepDuration = 0.26;
      var groupGap = 0.5;
      var groups = 2;
      var beepsPerGroup = 3;
      var groupLength = (beepsPerGroup - 1) * beepInterval + beepDuration + groupGap;

      for (var g = 0; g < groups; g++) {
        var groupStart = g * groupLength;
        for (var i = 0; i < beepsPerGroup; i++) {
          var start = now + groupStart + i * beepInterval;
          var osc = audioCtx.createOscillator();
          var gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.35, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(start);
          osc.stop(start + 0.26);
        }
      }
    }

    function toggleSound() {
      timerState.soundEnabled = !timerState.soundEnabled;
      render();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function () {
          showToast('Fullscreen not available');
        });
      } else {
        document.exitFullscreen();
      }
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        els.toast.classList.remove('visible');
      }, 2500);
    }

    function canEditInput() {
      return !timerState.isRunning && !timerState.isPaused && !timerState.isFinished;
    }

    function render() {
      var displaySeconds;

      if (timerState.isRunning || timerState.isPaused || timerState.isFinished) {
        displaySeconds = timerState.remainingSeconds;
      } else {
        displaySeconds = parseInputBuffer().totalSeconds;
      }

      els.timeDisplay.textContent = formatTime(displaySeconds);
      els.timeDisplay.classList.toggle('paused', timerState.isPaused);
      els.timeDisplay.classList.toggle('finished', timerState.isFinished);

      if (canEditInput() && timerState.inputBuffer) {
        els.inputPreview.textContent = 'Input: ' + timerState.inputBuffer;
      } else if (timerState.isRunning && !timerState.isPaused) {
        els.inputPreview.textContent = 'Running…';
      } else if (timerState.isPaused) {
        els.inputPreview.textContent = 'Paused';
      } else if (timerState.isFinished) {
        els.inputPreview.textContent = '';
      } else {
        els.inputPreview.textContent = 'Enter digits (e.g. 630 → 6 min 30 sec)';
      }

      els.digitButtons.forEach(function (btn) {
        btn.disabled = !canEditInput();
      });

      els.btnClear.disabled = !canEditInput();

      els.btnStart.disabled = timerState.isRunning && !timerState.isPaused;
      els.btnPause.disabled = !timerState.isRunning || timerState.isPaused;
      els.btnResume.disabled = !timerState.isRunning || !timerState.isPaused;

      var canAdjust = timerState.isRunning || timerState.isPaused || timerState.isFinished;
      els.adjustButtons.forEach(function (btn) {
        btn.disabled = !canAdjust;
      });

      els.btnSound.textContent = timerState.soundEnabled ? 'Sound ON' : 'Sound OFF';
      els.btnSound.classList.toggle('btn-top--sound-on', timerState.soundEnabled);
      els.btnSound.classList.toggle('btn-top--sound-off', !timerState.soundEnabled);
      els.btnSound.setAttribute('aria-pressed', timerState.soundEnabled ? 'true' : 'false');

      els.btnFullscreen.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
    }

    function handleKeydown(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      var key = e.key;

      if (key >= '0' && key <= '9') {
        e.preventDefault();
        handleDigit(key);
        return;
      }

      if (key === 'Enter') {
        e.preventDefault();
        if (timerState.isRunning && timerState.isPaused) {
          unlockAudio();
          resumeTimer();
        } else if (!timerState.isRunning) {
          onStartClick();
        }
        return;
      }

      if (key === ' ') {
        e.preventDefault();
        if (timerState.isRunning && timerState.isPaused) {
          unlockAudio();
          resumeTimer();
        } else if (timerState.isRunning) {
          pauseTimer();
        } else if (!timerState.isRunning) {
          onStartClick();
        }
        return;
      }

      if (key === 'Backspace') {
        e.preventDefault();
        backspaceInput();
        return;
      }

      if (key === 'c' || key === 'C') {
        e.preventDefault();
        clearInput();
        return;
      }

      if (key === 'r' || key === 'R') {
        e.preventDefault();
        resetTimer();
        return;
      }

      if (key === 'f' || key === 'F') {
        e.preventDefault();
        toggleFullscreen();
        return;
      }

      if (key === 'Escape') {
        if (document.fullscreenElement) {
          e.preventDefault();
          document.exitFullscreen();
        } else if (canEditInput() && timerState.inputBuffer) {
          e.preventDefault();
          clearInput();
        }
      }
    }

    init();
  </script>
</body>
</html>

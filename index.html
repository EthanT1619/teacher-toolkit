<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tool Kit for JLS Teacher — 수업용 유틸, 학습툴, 활동 모음">
  <title>Tool Kit for JLS Teacher</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
      --radius: 14px;
      --util: #0ea5e9;
      --util-bg: #e0f2fe;
      --study: #8b5cf6;
      --study-bg: #ede9fe;
      --activity: #f59e0b;
      --activity-bg: #fef3c7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 35%, #fff 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1rem;
      color: var(--text-muted);
    }

    .menu-list {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dropdown {
      position: relative;
      flex: 1 1 0;
      min-width: 180px;
      max-width: 280px;
    }

    .dropdown__toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      font: inherit;
      color: inherit;
      cursor: pointer;
      text-align: center;
      list-style: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .dropdown[open] .dropdown__toggle {
      border-color: #c7d2fe;
      box-shadow: 0 6px 12px -2px rgb(0 0 0 / 0.1);
    }

    .dropdown--util[open] .dropdown__toggle { border-color: #7dd3fc; }
    .dropdown--study[open] .dropdown__toggle { border-color: #c4b5fd; }
    .dropdown--activity[open] .dropdown__toggle { border-color: #fcd34d; }

    .dropdown__toggle::-webkit-details-marker { display: none; }

    .dropdown__toggle::marker { content: ""; }

    .dropdown__label {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .dropdown__count {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .dropdown__chevron {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .dropdown[open] .dropdown__chevron {
      transform: rotate(180deg);
    }

    .dropdown__badge {
      display: inline-flex;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 700;
    }

    .dropdown--util .dropdown__badge {
      background: var(--util-bg);
      color: #0369a1;
    }

    .dropdown--study .dropdown__badge {
      background: var(--study-bg);
      color: #6d28d9;
    }

    .dropdown--activity .dropdown__badge {
      background: var(--activity-bg);
      color: #b45309;
    }

    .dropdown__menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      min-width: 100%;
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 12px 24px -4px rgb(0 0 0 / 0.12);
      padding: 8px;
    }

    .dropdown__item {
      display: block;
      padding: 12px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 0.9375rem;
      transition: background 0.15s ease;
    }

    .dropdown__item:hover {
      background: #f8fafc;
    }

    .dropdown--util .dropdown__item:hover { background: var(--util-bg); }
    .dropdown--study .dropdown__item:hover { background: var(--study-bg); }
    .dropdown--activity .dropdown__item:hover { background: var(--activity-bg); }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .wrap { padding: 32px 16px 48px; }

      .menu-list {
        flex-direction: column;
        align-items: stretch;
      }

      .dropdown {
        max-width: none;
      }

      .dropdown__menu {
        position: static;
        margin-top: 8px;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tool Kit for JLS Teacher</h1>
      <p>카테고리를 선택하면 도구 목록이 펼쳐집니다.</p>
    </header>

    <div class="menu-list">
      <details class="dropdown dropdown--util">
        <summary class="dropdown__toggle">
          <span class="dropdown__badge">유틸</span>
          <span class="dropdown__count">4개</span>
          <svg class="dropdown__chevron" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </summary>
        <nav class="dropdown__menu" aria-label="유틸 도구">
          <a class="dropdown__item" href="./classroom-timer/">Classroom Timer</a>
          <a class="dropdown__item" href="./participation-tracker/">Participation Tracker</a>
          <a class="dropdown__item" href="./class-random-picker/">Random Picker</a>
          <a class="dropdown__item" href="./edu-scoreboard/">Score Board</a>
        </nav>
      </details>

      <details class="dropdown dropdown--study">
        <summary class="dropdown__toggle">
          <span class="dropdown__badge">학습툴</span>
          <span class="dropdown__count">1개</span>
          <svg class="dropdown__chevron" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </summary>
        <nav class="dropdown__menu" aria-label="학습툴">
          <a class="dropdown__item" href="./vocab-study-mobile/">Vocab Study Tool</a>
        </nav>
      </details>

      <details class="dropdown dropdown--activity">
        <summary class="dropdown__toggle">
          <span class="dropdown__badge">활동</span>
          <span class="dropdown__count">9개</span>
          <svg class="dropdown__chevron" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </summary>
        <nav class="dropdown__menu" aria-label="활동">
          <a class="dropdown__item" href="./barrel-game/">Barrel Game</a>
          <a class="dropdown__item" href="./fortress-battle/">Cannon Game</a>
          <a class="dropdown__item" href="./dice-chance/">Dice Tool</a>
          <a class="dropdown__item" href="./ladder-game/">Ladder Game</a>
          <a class="dropdown__item" href="./mystery-box-picker/">Mystery Box</a>
          <a class="dropdown__item" href="./nerfgun-board/">Nerf Gun Roulette</a>
          <a class="dropdown__item" href="./pirate-race/">Pirate Race</a>
          <a class="dropdown__item" href="./sentence-battle/">Sentence Battle</a>
          <a class="dropdown__item" href="./juldarigi/">Tug of War</a>
        </nav>
      </details>
    </div>

    <footer>Tool Kit for JLS Teacher</footer>
  </div>
</body>
</html>
